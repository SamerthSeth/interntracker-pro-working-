<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InternTrack Pro</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: dark; }
    body { font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; background: #0f1218; color: #e0e2ed; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { transition: all 0.2s ease; }
    button:active { transform: scale(0.98); }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(174, 198, 255, 0.35); }
    .shimmer { position: relative; overflow: hidden; background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.14) 50%, rgba(255,255,255,0.05) 100%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .active-link { color: #aec6ff; }
    .page-link:hover { color: #0070f3; }
  </style>
</head>
<body>
  <div id="root" class="min-h-screen"></div>
  <script src="app.js"></script>
</body>
</html>
